name: bikeistanbul
description: Akıllı Bisiklet Paylaşım ve Ulaşım Entegrasyon Platformu
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Yönetimi
  provider: ^6.1.2
  riverpod: ^2.5.1

  # Harita (OpenStreetMap - ücretsiz, API key yok)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # HTTP İstemcisi
  dio: ^5.6.0

  # Yerel Depolama
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # QR Kod
  mobile_scanner: ^5.2.1

  # Bildirimler
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # Yardımcılar
  intl: ^0.19.0
  uuid: ^4.5.0
  freezed_annotation: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
